<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astrology Post Generator</title>
    
    <!-- Tailwind CSS for rapid styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- html2canvas for generating the final image -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <!-- Elegant Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glow-color: #d4af37;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Tailwind slate-900 */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        .font-serif {
            font-family: 'Cinzel', serif;
        }

        /* Custom Scrollbar for the sidebar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        /* Canvas Wrapper to maintain Aspect Ratio and scaling */
        .canvas-wrapper {
            position: relative;
            width: 100%;
            max-width: 450px; /* Base width for preview */
            margin: 0 auto;
            aspect-ratio: 4 / 5; /* Standard Instagram Portrait */
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        #scale-container {
            transform-origin: top left;
            width: 1080px;
            height: 1350px;
        }

        /* Actual Canvas Element that gets exported */
        #post-canvas {
            width: 1080px;
            height: 1350px;
            position: relative;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 8rem;
            text-align: center;
            overflow: hidden;
            z-index: 1;
        }

        /* Decorative Borders */
        .canvas-border {
            position: absolute;
            top: 4rem;
            left: 4rem;
            right: 4rem;
            bottom: 4rem;
            border: 2px solid rgba(212, 175, 55, 0.3);
            pointer-events: none;
            z-index: 10;
        }
        
        .canvas-border::before, .canvas-border::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            border: 2px solid rgba(212, 175, 55, 0.6);
        }
        .canvas-border::before { top: -12px; left: -12px; }
        .canvas-border::after { bottom: -12px; right: -12px; }

        /* The glowing text effect */
        .glow-text {
            text-shadow: 0 0 20px var(--glow-color), 0 0 40px var(--glow-color), 0 0 60px var(--glow-color);
        }

        /* Logo Positioning */
        .watermark-logo {
            position: absolute;
            top: 10%;
            bottom: 10%;
            left: 10%;
            right: 10%;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.1; /* Translucent */
            z-index: 0;
            pointer-events: none;
        }

        .corner-logo {
            position: absolute;
            width: 140px;
            height: 140px;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 20;
        }

        .logo-tl {
            top: 5rem;
            left: 5rem;
        }

        .logo-br {
            bottom: 5rem;
            right: 5rem;
        }

        /* Content Z-index to stay above watermark */
        .canvas-content {
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            width: 100%;
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            padding: 0;
            overflow: hidden;
            cursor: pointer;
        }
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 50%;
        }
    </style>
</head>
<body class="text-gray-200 h-screen overflow-hidden flex flex-col md:flex-row">

    <!-- Sidebar Controls -->
    <aside class="w-full md:w-[400px] bg-slate-800 border-r border-slate-700 h-full overflow-y-auto p-6 flex flex-col gap-6 shadow-xl z-20 shrink-0">
        <div class="mb-2">
            <h1 class="text-2xl font-serif text-white font-bold tracking-wider">Post Creator</h1>
            <p class="text-sm text-slate-400 mt-1">Design your social media graphics.</p>
        </div>

        <!-- Image Upload -->
        <div class="bg-slate-700/50 p-4 rounded-xl border border-slate-600">
            <label class="block text-sm font-medium text-slate-300 mb-2">Upload Logo (PNG/JPG)</label>
            <input type="file" id="logo-upload" accept="image/*" class="block w-full text-sm text-slate-400
                file:mr-4 file:py-2 file:px-4
                file:rounded-full file:border-0
                file:text-sm file:font-semibold
                file:bg-indigo-600 file:text-white
                hover:file:bg-indigo-700 transition cursor-pointer">
            <p class="text-xs text-slate-400 mt-2">Logo will appear as a background watermark, and at the top-left & bottom-right.</p>
        </div>

        <!-- Content Editing -->
        <div class="space-y-4">
            <!-- Heading -->
            <div class="bg-slate-700/30 p-3 rounded-lg border border-slate-600/50 space-y-2">
                <label class="block text-sm font-medium text-slate-300">Heading</label>
                <input type="text" id="heading-input" value="The stars are aligning." class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500 transition text-sm">
                <div class="flex gap-2 items-center">
                    <input type="text" id="heading-font" placeholder="Google Font (e.g. Cinzel)" value="Cinzel" class="flex-1 bg-slate-900 border border-slate-600 rounded-lg px-3 py-1.5 text-white focus:outline-none focus:border-indigo-500 transition text-xs" title="Press Enter or click away to apply font">
                    <input type="color" id="heading-color" value="#fce7ab" title="Heading Color">
                </div>
                <div class="flex gap-4 pt-2 border-t border-slate-600/50 mt-2">
                    <div class="flex-1 flex flex-col gap-1">
                        <label class="text-[10px] text-slate-400 uppercase tracking-wider">Size</label>
                        <input type="range" id="heading-size" min="30" max="180" value="90" class="w-full accent-indigo-500">
                    </div>
                    <div class="flex-1 flex flex-col gap-1">
                        <label class="text-[10px] text-slate-400 uppercase tracking-wider">Vert Pos</label>
                        <input type="range" id="heading-pos" min="-600" max="600" value="0" class="w-full accent-indigo-500">
                    </div>
                </div>
            </div>
            
            <!-- Body -->
            <div class="bg-slate-700/30 p-3 rounded-lg border border-slate-600/50 space-y-2">
                <label class="block text-sm font-medium text-slate-300">Sub-heading / Body</label>
                <textarea id="body-input" rows="3" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500 transition resize-none text-sm">WE ARE SEEKING A PROFESSIONAL ASTROLOGER TO JOIN OUR GROWING COMMUNITY.</textarea>
                <div class="flex gap-2 items-center">
                    <input type="text" id="body-font" placeholder="Google Font (e.g. Cinzel)" value="Cinzel" class="flex-1 bg-slate-900 border border-slate-600 rounded-lg px-3 py-1.5 text-white focus:outline-none focus:border-indigo-500 transition text-xs" title="Press Enter or click away to apply font">
                    <input type="color" id="body-color" value="#fce7ab" title="Body Color">
                </div>
                <div class="flex gap-4 pt-2 border-t border-slate-600/50 mt-2">
                    <div class="flex-1 flex flex-col gap-1">
                        <label class="text-[10px] text-slate-400 uppercase tracking-wider">Size</label>
                        <input type="range" id="body-size" min="20" max="120" value="60" class="w-full accent-indigo-500">
                    </div>
                    <div class="flex-1 flex flex-col gap-1">
                        <label class="text-[10px] text-slate-400 uppercase tracking-wider">Vert Pos</label>
                        <input type="range" id="body-pos" min="-600" max="600" value="0" class="w-full accent-indigo-500">
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="bg-slate-700/30 p-3 rounded-lg border border-slate-600/50 space-y-2">
                <label class="block text-sm font-medium text-slate-300">Footer Text</label>
                <input type="text" id="footer-input" value="APPLY AT THE LINK IN BIO ✨ #ASTROLOGY" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500 transition text-sm">
                <div class="flex gap-2 items-center">
                    <input type="text" id="footer-font" placeholder="Google Font (e.g. Inter)" value="Inter" class="flex-1 bg-slate-900 border border-slate-600 rounded-lg px-3 py-1.5 text-white focus:outline-none focus:border-indigo-500 transition text-xs" title="Press Enter or click away to apply font">
                    <input type="color" id="footer-color" value="#fce7ab" title="Footer Color">
                </div>
                <div class="flex gap-4 pt-2 border-t border-slate-600/50 mt-2">
                    <div class="flex-1 flex flex-col gap-1">
                        <label class="text-[10px] text-slate-400 uppercase tracking-wider">Size</label>
                        <input type="range" id="footer-size" min="16" max="80" value="35" class="w-full accent-indigo-500">
                    </div>
                    <div class="flex-1 flex flex-col gap-1">
                        <label class="text-[10px] text-slate-400 uppercase tracking-wider">Vert Pos</label>
                        <input type="range" id="footer-pos" min="-600" max="600" value="0" class="w-full accent-indigo-500">
                    </div>
                </div>
            </div>
        </div>

        <!-- Styling Controls -->
        <div class="space-y-4 pt-4 border-t border-slate-700">
            <h3 class="text-sm font-semibold text-slate-300 uppercase tracking-wider">Styling & Colors</h3>
            
            <!-- Background Image Upload -->
            <div class="bg-slate-700/30 p-3 rounded-lg border border-slate-600/50">
                <label class="block text-sm font-medium text-slate-300 mb-2">Background Image (Overrides Colors)</label>
                <input type="file" id="bg-upload" accept="image/*" class="block w-full text-sm text-slate-400
                    file:mr-4 file:py-1.5 file:px-3
                    file:rounded-full file:border-0
                    file:text-xs file:font-semibold
                    file:bg-slate-600 file:text-white
                    hover:file:bg-slate-500 transition cursor-pointer">
                <button id="remove-bg-btn" class="hidden mt-2 text-xs text-red-400 hover:text-red-300 underline">Remove Image</button>
            </div>

            <div class="flex items-center justify-between bg-slate-700/30 p-3 rounded-lg border border-slate-600/50">
                <label class="text-sm text-slate-300">Background Top</label>
                <input type="color" id="bg-color-1" value="#1a1a2e">
            </div>
            
            <div class="flex items-center justify-between bg-slate-700/30 p-3 rounded-lg border border-slate-600/50">
                <label class="text-sm text-slate-300">Background Bottom</label>
                <input type="color" id="bg-color-2" value="#16213e">
            </div>

            <div class="flex items-center justify-between bg-slate-700/30 p-3 rounded-lg border border-slate-600/50">
                <label class="text-sm text-slate-300">Border Tint Color</label>
                <input type="color" id="border-color" value="#d4af37">
            </div>

            <div class="flex items-center justify-between bg-slate-700/30 p-3 rounded-lg border border-slate-600/50">
                <label class="text-sm text-slate-300">Glow Effect Color</label>
                <input type="color" id="glow-color" value="#d4af37">
            </div>

            <div class="flex flex-col gap-2 bg-slate-700/30 p-3 rounded-lg border border-slate-600/50">
                <label class="text-sm text-slate-300 flex justify-between">
                    <span>Watermark Opacity</span>
                    <span id="opacity-val">10%</span>
                </label>
                <input type="range" id="watermark-opacity" min="0" max="100" value="10" class="w-full accent-indigo-500">
            </div>
        </div>

        <button id="download-btn" class="mt-auto w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-4 rounded-lg shadow-lg hover:shadow-indigo-500/30 transition-all flex justify-center items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            <span>Download Post</span>
        </button>
    </aside>

    <!-- Preview Area -->
    <main class="flex-1 bg-slate-900 relative overflow-y-auto overflow-x-hidden flex items-center justify-center p-8 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')]">
        
        <div class="canvas-wrapper group" id="canvas-wrapper">
            <div id="scale-container">
                <!-- The actual DOM element to be captured -->
                <div id="post-canvas">
                    
                    <!-- Logos (Now divs with background-image to prevent stretch issues) -->
                    <div id="watermark-img" class="watermark-logo hidden"></div>
                    <div id="logo-tl-img" class="corner-logo logo-tl hidden"></div>
                    <div id="logo-br-img" class="corner-logo logo-br hidden"></div>

                    <!-- Decorative elements -->
                    <div class="canvas-border"></div>

                    <!-- Text Content -->
                    <div class="canvas-content h-full flex flex-col justify-between py-12">
                        
                        <!-- Top section (Empty for spacing, or can hold content) -->
                        <div class="flex-1"></div>

                        <!-- Middle Section (Heading & Body) -->
                        <div class="flex flex-col gap-10">
                            <h1 id="render-heading" class="font-serif text-[#fce7ab] glow-text leading-tight" style="font-size: 90px;">
                                The stars are aligning.
                            </h1>
                            <p id="render-body" class="font-serif text-[#fce7ab] leading-snug whitespace-pre-wrap" style="font-size: 60px;">WE ARE SEEKING A PROFESSIONAL ASTROLOGER TO JOIN OUR GROWING COMMUNITY.</p>
                        </div>

                        <!-- Bottom Section (Footer) -->
                        <div class="flex-1 flex flex-col justify-end">
                            <p id="render-footer" class="tracking-widest uppercase font-semibold text-[#fce7ab] opacity-80" style="font-size: 35px;">
                                APPLY AT THE LINK IN BIO ✨ #ASTROLOGY
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // DOM Elements
            const logoUpload = document.getElementById('logo-upload');
            const watermarkImg = document.getElementById('watermark-img');
            const logoTlImg = document.getElementById('logo-tl-img');
            const logoBrImg = document.getElementById('logo-br-img');
            
            const headingInput = document.getElementById('heading-input');
            const bodyInput = document.getElementById('body-input');
            const footerInput = document.getElementById('footer-input');
            
            const headingFont = document.getElementById('heading-font');
            const bodyFont = document.getElementById('body-font');
            const footerFont = document.getElementById('footer-font');
            
            const headingColor = document.getElementById('heading-color');
            const bodyColor = document.getElementById('body-color');
            const footerColor = document.getElementById('footer-color');
            
            const headingSize = document.getElementById('heading-size');
            const bodySize = document.getElementById('body-size');
            const footerSize = document.getElementById('footer-size');
            
            const headingPos = document.getElementById('heading-pos');
            const bodyPos = document.getElementById('body-pos');
            const footerPos = document.getElementById('footer-pos');
            
            const renderHeading = document.getElementById('render-heading');
            const renderBody = document.getElementById('render-body');
            const renderFooter = document.getElementById('render-footer');
            
            const bgColor1 = document.getElementById('bg-color-1');
            const bgColor2 = document.getElementById('bg-color-2');
            const borderColor = document.getElementById('border-color');
            const glowColor = document.getElementById('glow-color');
            const watermarkOpacity = document.getElementById('watermark-opacity');
            const opacityVal = document.getElementById('opacity-val');
            
            const bgUpload = document.getElementById('bg-upload');
            const removeBgBtn = document.getElementById('remove-bg-btn');

            const postCanvas = document.getElementById('post-canvas');
            const downloadBtn = document.getElementById('download-btn');

            // Dynamic Canvas Scaling for perfect WYSIWYG
            const scaleCanvas = () => {
                const wrapper = document.getElementById('canvas-wrapper');
                const scaleContainer = document.getElementById('scale-container');
                if (!wrapper || !scaleContainer) return;
                const scale = wrapper.clientWidth / 1080;
                scaleContainer.style.transform = `scale(${scale})`;
            };
            
            // Observe the wrapper to ensure it always stays perfectly scaled
            const resizeObserver = new ResizeObserver(() => scaleCanvas());
            resizeObserver.observe(document.getElementById('canvas-wrapper'));
            scaleCanvas();

            // Handle Image Upload
            logoUpload.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const imgUrl = event.target.result;
                        
                        // Set background images
                        watermarkImg.style.backgroundImage = `url(${imgUrl})`;
                        logoTlImg.style.backgroundImage = `url(${imgUrl})`;
                        logoBrImg.style.backgroundImage = `url(${imgUrl})`;
                        
                        // Unhide images
                        watermarkImg.classList.remove('hidden');
                        logoTlImg.classList.remove('hidden');
                        logoBrImg.classList.remove('hidden');
                    }
                    reader.readAsDataURL(file);
                }
            });

            // Handle Text Inputs Real-time
            const updateText = (inputEl, renderEl) => {
                inputEl.addEventListener('input', (e) => {
                    renderEl.textContent = e.target.value;
                });
            };
            updateText(headingInput, renderHeading);
            updateText(bodyInput, renderBody);
            updateText(footerInput, renderFooter);

            // Font Loading Logic
            const loadedFonts = new Set(['Cinzel', 'Inter']);
            const loadGoogleFont = (fontName) => {
                if (!fontName) return;
                const cleanName = fontName.trim();
                if (!loadedFonts.has(cleanName)) {
                    const link = document.createElement('link');
                    link.rel = 'stylesheet';
                    link.href = `https://fonts.googleapis.com/css2?family=${cleanName.replace(/\s+/g, '+')}:wght@300;400;600;700&display=swap`;
                    document.head.appendChild(link);
                    loadedFonts.add(cleanName);
                }
            };

            const setupFontControl = (fontInput, renderEl) => {
                fontInput.addEventListener('change', (e) => {
                    const fontName = e.target.value;
                    loadGoogleFont(fontName);
                    renderEl.style.fontFamily = `"${fontName}", sans-serif`;
                });
            };
            setupFontControl(headingFont, renderHeading);
            setupFontControl(bodyFont, renderBody);
            setupFontControl(footerFont, renderFooter);

            // Segment Color Logic
            const setupColorControl = (colorInput, renderEl) => {
                colorInput.addEventListener('input', (e) => {
                    renderEl.style.color = e.target.value;
                });
            };
            setupColorControl(headingColor, renderHeading);
            setupColorControl(bodyColor, renderBody);
            setupColorControl(footerColor, renderFooter);

            // Text Size Logic
            const setupSizeControl = (sizeInput, renderEl) => {
                sizeInput.addEventListener('input', (e) => {
                    renderEl.style.fontSize = `${e.target.value}px`;
                });
            };
            setupSizeControl(headingSize, renderHeading);
            setupSizeControl(bodySize, renderBody);
            setupSizeControl(footerSize, renderFooter);

            // Vertical Position Logic
            const setupPosControl = (posInput, renderEl) => {
                posInput.addEventListener('input', (e) => {
                    renderEl.style.transform = `translateY(${e.target.value}px)`;
                });
            };
            setupPosControl(headingPos, renderHeading);
            setupPosControl(bodyPos, renderBody);
            setupPosControl(footerPos, renderFooter);

            let currentBgImage = null;

            // Handle Colors & Styling Real-time
            const updateBackground = () => {
                if (currentBgImage) {
                    postCanvas.style.background = `url(${currentBgImage})`;
                    postCanvas.style.backgroundSize = 'cover';
                    postCanvas.style.backgroundPosition = 'center';
                } else {
                    postCanvas.style.background = `linear-gradient(135deg, ${bgColor1.value} 0%, ${bgColor2.value} 100%)`;
                }
            };

            // Handle Background Image Upload
            bgUpload.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        currentBgImage = event.target.result;
                        updateBackground();
                        removeBgBtn.classList.remove('hidden');
                    }
                    reader.readAsDataURL(file);
                }
            });

            // Handle Background Image Removal
            removeBgBtn.addEventListener('click', () => {
                currentBgImage = null;
                bgUpload.value = ''; // Reset input
                updateBackground();
                removeBgBtn.classList.add('hidden');
            });

            bgColor1.addEventListener('input', updateBackground);
            bgColor2.addEventListener('input', updateBackground);

            borderColor.addEventListener('input', (e) => {
                const color = e.target.value;
                document.querySelector('.canvas-border').style.borderColor = `${color}4D`; // 30% opacity hex
            });

            glowColor.addEventListener('input', (e) => {
                const color = e.target.value;
                // Update CSS Variable for glow
                document.documentElement.style.setProperty('--glow-color', color);
            });

            watermarkOpacity.addEventListener('input', (e) => {
                const val = e.target.value;
                watermarkImg.style.opacity = val / 100;
                opacityVal.textContent = `${val}%`;
            });

            // Handle Download using html2canvas
            downloadBtn.addEventListener('click', async () => {
                try {
                    // Make sure custom fonts injected via JS are fully loaded before rendering
                    await document.fonts.ready;

                    // Visual feedback
                    const originalText = downloadBtn.innerHTML;
                    downloadBtn.innerHTML = `
                        <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        Generating High-Res...
                    `;
                    downloadBtn.disabled = true;

                    // We force strict 1080x1350 rendering parameters and strip out
                    // the scaling wrapper from the DOM clone so the generator calculates sizes accurately.
                    const canvas = await html2canvas(postCanvas, {
                        width: 1080,
                        height: 1350,
                        windowWidth: 1080,
                        windowHeight: 1350,
                        scale: 2, // 2160x2700 output
                        useCORS: true,
                        allowTaint: true,
                        backgroundColor: null,
                        onclone: (documentClone) => {
                            const clonedScaleContainer = documentClone.getElementById('scale-container');
                            if (clonedScaleContainer) {
                                // Remove the CSS scale from the clone to prevent text squishing bugs
                                clonedScaleContainer.style.transform = 'none';
                            }
                        }
                    });

                    // Create download link
                    const link = document.createElement('a');
                    link.download = `social-post-${Date.now()}.png`;
                    link.href = canvas.toDataURL('image/png', 1.0);
                    link.click();

                } catch (error) {
                    console.error('Error generating image:', error);
                    alert('There was an error generating your image. Please try again.');
                } finally {
                    // Restore button
                    downloadBtn.disabled = false;
                    downloadBtn.innerHTML = `
